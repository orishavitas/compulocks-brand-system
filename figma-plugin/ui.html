<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; padding: 16px; background: #2c2c2c; color: #fff; }
    h2 { font-size: 14px; margin-bottom: 12px; color: #e0e0e0; }
    .config { margin-bottom: 16px; }
    .config label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
    .config input {
      width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px;
      background: #3c3c3c; color: #fff; font-size: 12px;
    }
    .mode-section { margin-bottom: 16px; }
    .mode-section label { display: block; font-size: 11px; color: #999; margin-bottom: 6px; }
    .mode-pills {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .mode-pill {
      flex: 1; padding: 6px 8px; border: 1px solid #555; border-radius: 20px;
      font-size: 11px; font-weight: 500; cursor: pointer; background: #3c3c3c;
      color: #ccc; text-align: center; transition: all 0.15s;
      min-width: 60px;
    }
    .mode-pill:hover { border-color: #888; color: #fff; }
    .mode-pill.active { background: #18A0FB; border-color: #18A0FB; color: #fff; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .pull { background: #18A0FB; color: #fff; }
    .push { background: #7B61FF; color: #fff; }
    .sync { background: #1bc47d; color: #fff; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 12px; padding: 8px; border-radius: 4px;
      font-size: 11px; background: #3c3c3c; min-height: 24px;
    }
    .success { color: #1bc47d; }
    .error { color: #f24822; }
    .info { color: #18A0FB; }
  </style>
</head>
<body>
  <h2>Compulocks Token Sync</h2>

  <div class="config">
    <label>n8n Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://your-n8n.example.com/webhook/..." />
  </div>

  <div class="config">
    <label>GitHub Token (for private repo)</label>
    <input type="password" id="githubToken" placeholder="ghp_..." />
  </div>

  <div class="mode-section">
    <label>Scope</label>
    <div class="mode-pills">
      <button type="button" class="mode-pill active" data-mode="tokens">Tokens</button>
      <button type="button" class="mode-pill" data-mode="components">Components</button>
      <button type="button" class="mode-pill" data-mode="style-guide">Style Guide</button>
      <button type="button" class="mode-pill" data-mode="all">All</button>
    </div>
  </div>

  <div class="actions">
    <button class="pull" id="pullBtn">Pull</button>
    <button class="push" id="pushBtn">Push</button>
    <button class="sync" id="syncBtn">Sync</button>
  </div>

  <div id="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const pullBtn = document.getElementById('pullBtn');
    const pushBtn = document.getElementById('pushBtn');
    const webhookInput = document.getElementById('webhookUrl');
    const syncBtn = document.getElementById('syncBtn');
    const githubTokenInput = document.getElementById('githubToken');

    // --- Mode selector ---
    let selectedMode = 'tokens';
    document.querySelectorAll('.mode-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        selectedMode = pill.dataset.mode;
      });
    });

    function setStatus(msg, type = 'info') {
      statusEl.innerHTML = `<span class="${type}">${msg}</span>`;
    }

    function getWebhookUrl() {
      return webhookInput.value.trim().replace(/\/+$/, '');
    }

    function allButtons() { return [pullBtn, pushBtn, syncBtn]; }
    function disableAll() { allButtons().forEach(b => b.disabled = true); }
    function enableAll() { allButtons().forEach(b => b.disabled = false); }

    // Pull — always tokens from n8n (mode-independent)
    pullBtn.addEventListener('click', async () => {
      const url = getWebhookUrl();
      if (!url) { setStatus('Enter your n8n webhook URL first.', 'error'); return; }

      setStatus('Pulling tokens from n8n…', 'info');
      disableAll();

      try {
        const res = await fetch(url + '/pull', { method: 'GET' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        const data = Array.isArray(raw) ? (raw[0]?.json ?? raw[0]) : raw;
        if (!data || !data.collections) throw new Error('Invalid response shape from n8n');
        parent.postMessage({ pluginMessage: { type: 'pull', data } }, '*');
      } catch (err) {
        setStatus(`Pull failed: ${err.message}`, 'error');
        enableAll();
      }
    });

    async function fetchManifest(token) {
      const apiUrl = 'https://api.github.com/repos/orishavitas/compulocks-brand-system/contents/component-manifest.json';
      const res = await fetch(apiUrl, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      if (!res.ok) throw new Error(`GitHub API: HTTP ${res.status}`);
      const json = await res.json();
      return JSON.parse(atob(json.content.replace(/\n/g, '')));
    }

    // Sync — uses mode selector: components / style-guide / all
    syncBtn.addEventListener('click', async () => {
      const token = githubTokenInput.value.trim();
      const mode = selectedMode;

      if (mode === 'tokens') {
        setStatus('Select Components, Style Guide, or All — then click Sync.', 'info');
        return;
      }

      if (!token) { setStatus('Enter your GitHub token first.', 'error'); return; }

      setStatus(`Syncing [${mode}] from GitHub…`, 'info');
      disableAll();

      try {
        const manifest = await fetchManifest(token);
        parent.postMessage({ pluginMessage: { type: 'sync-components', manifest, mode } }, '*');
      } catch (err) {
        setStatus(`Manifest fetch failed: ${err.message}`, 'error');
        enableAll();
      }
    });

    pushBtn.addEventListener('click', () => {
      const url = getWebhookUrl();
      if (!url) { setStatus('Enter your n8n webhook URL first.', 'error'); return; }
      const mode = selectedMode;
      setStatus(`Reading Figma variables [${mode}]…`, 'info');
      disableAll();
      parent.postMessage({ pluginMessage: { type: 'push-request', mode } }, '*');
    });

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'pull-complete') {
        setStatus(`Pulled ${msg.count} variables successfully.`, 'success');
        pullBtn.disabled = false;
      }

      if (msg.type === 'push-data') {
        const url = getWebhookUrl();
        try {
          const res = await fetch(url + '/push', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(msg.data)
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const result = await res.json();
          setStatus(`Pushed! PR created: ${result.prUrl || 'check n8n'}`, 'success');
        } catch (err) {
          setStatus(`Push failed: ${err.message}`, 'error');
        }
        pushBtn.disabled = false;
      }

      if (msg.type === 'sync-complete') {
        const now = new Date().toLocaleTimeString();
        setStatus(`Synced at ${now} — ${msg.created} created, ${msg.updated} updated, ${msg.skipped} skipped.`, 'success');
        syncBtn.disabled = false;
      }

      if (msg.type === 'sync-error') {
        setStatus(`Sync failed: ${msg.message}`, 'error');
        syncBtn.disabled = false;
      }

      if (msg.type === 'error') {
        setStatus(msg.message, 'error');
        pullBtn.disabled = false;
        pushBtn.disabled = false;
        syncBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
