<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; padding: 16px; background: #2c2c2c; color: #fff; }
    h2 { font-size: 14px; margin-bottom: 12px; color: #e0e0e0; }
    .config { margin-bottom: 16px; }
    .config label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
    .config input {
      width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px;
      background: #3c3c3c; color: #fff; font-size: 12px;
    }
    .actions { margin-top: 16px; }
    button.pull {
      width: 100%; padding: 12px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: #18A0FB; color: #fff;
    }
    button.pull:hover { opacity: 0.9; }
    button.pull:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 12px; padding: 8px; border-radius: 4px;
      font-size: 11px; background: #3c3c3c; min-height: 24px;
      line-height: 1.5;
    }
    .success { color: #1bc47d; }
    .error   { color: #f24822; }
    .info    { color: #18A0FB; }
  </style>
</head>
<body>
  <h2>Compulocks Token Sync</h2>

  <div class="config">
    <label>GitHub Token (repo read scope)</label>
    <input type="password" id="githubToken" placeholder="ghp_..." />
  </div>

  <div class="actions">
    <button class="pull" id="pullBtn">Pull Everything</button>
  </div>

  <div id="status"><span class="info">Enter your GitHub token and click Pull.</span></div>

  <script>
    const statusEl  = document.getElementById('status');
    const pullBtn   = document.getElementById('pullBtn');
    const tokenInput = document.getElementById('githubToken');

    const REPO = 'orishavitas/compulocks-brand-system';
    const BRANCH = 'master';

    function setStatus(msg, type = 'info') {
      statusEl.innerHTML = `<span class="${type}">${msg}</span>`;
    }

    async function ghFetch(path, token) {
      const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
      const res = await fetch(url, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status} for ${path}`);
      const json = await res.json();
      return JSON.parse(atob(json.content.replace(/\n/g, '')));
    }

    // --- DTCG → Figma converters (inlined, no build step needed) ---

    function hexToFigmaRgb(hex) {
      const h = hex.replace('#', '');
      return {
        r: Math.round(parseInt(h.slice(0,2), 16) / 255 * 1000) / 1000,
        g: Math.round(parseInt(h.slice(2,4), 16) / 255 * 1000) / 1000,
        b: Math.round(parseInt(h.slice(4,6), 16) / 255 * 1000) / 1000,
        a: 1
      };
    }

    function remToPx(v) { return parseFloat(v) * 16; }

    function collectTokens(obj, prefix) {
      prefix = prefix || '';
      const out = [];
      for (const key of Object.keys(obj)) {
        const val = obj[key];
        const path = prefix ? prefix + '/' + key : key;
        if (val && typeof val === 'object' && '$value' in val) {
          out.push({ path, value: val['$value'], type: val['$type'], description: val['$description'] || '' });
        } else if (val && typeof val === 'object' && !key.startsWith('$')) {
          out.push(...collectTokens(val, path));
        }
      }
      return out;
    }

    function buildCollections(color, spacing) {
      const collections = [];
      if (color) {
        collections.push({
          name: 'Brand Colors',
          variables: collectTokens(color).map(t => ({
            name: t.path,
            type: 'COLOR',
            value: hexToFigmaRgb(t.value),
            description: t.description
          }))
        });
      }
      if (spacing) {
        collections.push({
          name: 'Spacing',
          variables: collectTokens(spacing).map(t => ({
            name: t.path,
            type: 'FLOAT',
            value: remToPx(t.value),
            description: t.description
          }))
        });
      }
      return collections;
    }

    function buildTextStyles(typography) {
      const styles = typography.textStyle || {};
      const allTokens = collectTokens(typography);
      const refLookup = {};
      for (const t of allTokens) refLookup[t.path.replace(/\//g, '.')] = t.value;

      function resolve(val) {
        if (typeof val !== 'string') return val;
        const m = val.match(/^\{(.+)\}$/);
        return m ? (refLookup[m[1]] || val) : val;
      }
      function cleanFamily(val) {
        return val.replace(/'/g, '').split(',')[0].trim();
      }

      return Object.keys(styles).map(name => {
        const s = styles[name];
        const fontFamily  = s.fontFamily  ? cleanFamily(resolve(s.fontFamily['$value']))  : '';
        const fontWeight  = s.fontWeight  ? Number(resolve(s.fontWeight['$value']))       : 400;
        const fontSize    = s.fontSize    ? Number(resolve(s.fontSize['$value']))         : undefined;
        const italic      = s.fontStyle   ? resolve(s.fontStyle['$value']) === 'italic'   : false;
        const textTransform = s.textTransform ? resolve(s.textTransform['$value'])        : '';
        const desc = (s['$description'] || '') + (textTransform ? ` | textTransform: ${textTransform}` : '');
        return { name: `Text Styles/${name}`, fontFamily, fontWeight, fontSize, italic, description: desc };
      });
    }

    pullBtn.addEventListener('click', async () => {
      const token = tokenInput.value.trim();
      if (!token) { setStatus('Enter your GitHub token first.', 'error'); return; }

      pullBtn.disabled = true;
      setStatus('Fetching tokens from GitHub…', 'info');

      try {
        // 1. Fetch all source files in parallel
        const [color, typography, spacing, manifest] = await Promise.all([
          ghFetch('tokens/color.json',      token),
          ghFetch('tokens/typography.json', token),
          ghFetch('tokens/spacing.json',    token),
          ghFetch('component-manifest.json', token)
        ]);

        setStatus('Applying to Figma…', 'info');

        const collections = buildCollections(color, spacing);
        const textStyles  = buildTextStyles(typography);

        parent.postMessage({
          pluginMessage: {
            type: 'full-pull',
            collections,
            textStyles,
            manifest
          }
        }, '*');

      } catch (err) {
        setStatus(`Fetch failed: ${err.message}`, 'error');
        pullBtn.disabled = false;
      }
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'full-pull-complete') {
        setStatus(
          `Done — ${msg.vars} variables, ${msg.styles} text styles, ` +
          `${msg.created} components created, ${msg.updated} updated, ${msg.skipped} skipped.`,
          'success'
        );
        pullBtn.disabled = false;
      }

      if (msg.type === 'full-pull-error') {
        setStatus(`Error: ${msg.message}`, 'error');
        pullBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
